  integration-unauthenticated-add:
    name: Integration Unauthenticated Add (Public Repo)
    if: ${{ needs.changes.outputs.has_changes == 'true' }}
    needs:
    - changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    concurrency:
      group: ci-${{ github.ref }}-integration-unauthenticated-add
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Build gh-aw binary
      run: make build

    - name: Run unauthenticated integration tests
        # Explicitly clear all GitHub auth tokens to reproduce the agentic-workflow
        # environment where gh CLI is not authenticated. Tests must succeed for public
        # repositories via the raw URL / git fallback path.
      env:
        GITHUB_TOKEN: ""
        GH_TOKEN: ""
      run: |
        set -o pipefail
        go test -v -parallel=4 -timeout=10m -tags 'integration' -coverprofile=coverage-integration-unauthenticated.out -json \
          -run 'TestAddPublicWorkflowUnauthenticated|TestDownloadFileFromGitHubUnauthenticated' \
          ./pkg/cli/ ./pkg/parser/ \
          | tee test-result-integration-unauthenticated.json

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: test-result-integration-unauthenticated
        path: test-result-integration-unauthenticated.json
        retention-days: 3

    - name: Convert unauthenticated coverage to Cobertura
      if: always() && hashFiles('coverage-integration-unauthenticated.out') != ''
      run: |
        go install github.com/boumenot/gocover-cobertura@v1.5.0
        "$(go env GOPATH)/bin/gocover-cobertura" < coverage-integration-unauthenticated.out > coverage-integration-unauthenticated.xml

    - name: Upload unauthenticated coverage to code coverage API
      if: always() && vars.CODE_QUALITY_COVERAGE_ENABLED == 'true' && hashFiles('coverage-integration-unauthenticated.xml') != ''
      uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3   # v1
      with:
        file: coverage-integration-unauthenticated.xml
        language: Go
        label: code-coverage/ci-integration-unauthenticated
        fail-on-error: false

  integration-add-dispatch-workflow:
