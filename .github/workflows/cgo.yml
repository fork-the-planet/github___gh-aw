name: CGO

on:
  push:
    branches: [main]
    paths:
    - '**/*.go'
    - 'cmd/**'
    - 'pkg/**'
    - 'scripts/**'
    - 'go.mod'
    - 'go.sum'
    - 'Makefile'
    - 'actions/setup/sh/**'
    - '.github/workflows/ci.yml'
    - '.github/workflows/cgo.yml'
    - '.github/aw/releases.json'
    - '.github/aw/releases.schema.json'
    - '.github/aw/compat.json'
    - '.github/aw/compat.schema.json'
    - 'install-gh-aw.sh'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
    - '**/*.go'
    - 'cmd/**'
    - 'pkg/**'
    - 'scripts/**'
    - 'go.mod'
    - 'go.sum'
    - 'Makefile'
    - 'actions/setup/sh/**'
    - '.github/workflows/ci.yml'
    - '.github/workflows/cgo.yml'
    - '.github/workflows/**/*.md'
    - '.github/aw/releases.json'
    - '.github/aw/releases.schema.json'
    - '.github/aw/compat.json'
    - '.github/aw/compat.schema.json'
    - 'install-gh-aw.sh'
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-test
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Display Go environment
      run: |
        echo "Go environment:"
        go env | grep -E "GOPROXY|GOSUMDB|GOMODCACHE|GOPRIVATE"
        echo ""
        echo "Module cache location: $(go env GOMODCACHE)"

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          # Use -x for verbose output to see what's being downloaded
          if go mod download -x; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            EXIT_CODE=$?
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts (exit code: $EXIT_CODE)"
              echo "This indicates that proxy.golang.org is unreachable or returning errors"
              echo ""
              echo "Diagnostic information:"
              echo "- GOPROXY: $(go env GOPROXY)"
              echo "- GOSUMDB: $(go env GOSUMDB)"
              echo "- Network connectivity: checking proxy.golang.org..."
              if curl -s -I --connect-timeout 5 https://proxy.golang.org/golang.org/@v/list >/dev/null 2>&1; then
                echo "  ✓ proxy.golang.org is reachable"
              else
                echo "  ✗ proxy.golang.org is NOT reachable"
              fi
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Pre-flight check - Validate test dependencies
      run: |
        echo "Validating that test dependencies are available..."
        echo "This ensures go test can compile test packages without network access."
        echo ""

        # List all test dependencies to ensure they're in the cache
        # This will fail fast if any dependencies are missing
        echo "Checking test dependencies for all packages..."
        if go list -test -deps ./... >/dev/null 2>&1; then
          echo "✅ All test dependencies are available"
        else
          echo "❌ Failed to resolve test dependencies"
          echo ""
          echo "Attempting to show which dependencies are missing:"
          go list -test -deps ./... 2>&1 || true
          exit 1
        fi

        echo ""
        echo "Module cache statistics:"
        echo "- Cache directory: $(go env GOMODCACHE)"
        if [ -d "$(go env GOMODCACHE)" ]; then
          echo "- Cache size: $(du -sh $(go env GOMODCACHE) 2>/dev/null | cut -f1 || echo 'unknown')"
          echo "- Number of cached modules: $(find $(go env GOMODCACHE) -name "go.mod" 2>/dev/null | wc -l || echo 'unknown')"
        fi

    - name: Run unit tests with coverage
      id: run-unit-tests
      run: |
        set -o pipefail
        # Run tests with JSON output for artifacts, but also show failures
        go test -v -parallel=8 -timeout=3m -run='^Test' -tags '!integration' -coverprofile=coverage.out -json ./... | tee test-result-unit.json

        # Check if tests failed by looking at JSON output
        if grep -q '"Action":"fail"' test-result-unit.json; then
          echo "❌ Tests failed - see output above"
          exit 1
        fi

        # Generate coverage HTML report
        go tool cover -html=coverage.out -o coverage.html

    - name: Report test failures
      if: failure() && steps.run-unit-tests.outcome == 'failure'
      run: |
        echo "## 🔍 Unit Test Failure Analysis" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Analyzing unit test results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Run the failure report script
        if ./scripts/report-test-failures.sh test-result-unit.json | tee /tmp/failure-report.txt; then
          echo "No failures detected in JSON output (unexpected - tests failed but no failure records found)" >> $GITHUB_STEP_SUMMARY
        else
          # Script found failures - add to summary
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat /tmp/failure-report.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi

      # Coverage reports for recent builds only - 7 days is sufficient for debugging recent changes
    - name: Upload coverage report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: coverage-report
        path: coverage.html
        retention-days: 7

    - name: Upload unit test results
      if: always()    # Upload even if tests fail so canary-go can track coverage
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: test-result-cgo-unit
        path: test-result-unit.json
        retention-days: 7

  canary-go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
    - test
    if: always() && needs.test.result == 'success'  # Skip coverage check for cancelled/failed test runs
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: List unit tests in codebase
      run: |
        set -euo pipefail
        echo "Extracting unit test function names from source files..."
        go test -list='^Test' -tags '!integration' ./... 2>/dev/null | grep '^Test[A-Z]' | grep -v '^TestMain$' | sort -u > all-tests.txt
        echo "Found $(wc -l < all-tests.txt) unit tests in codebase"

    - name: Download unit test result artifacts
      uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16   # v4
      with:
        path: test-results
        pattern: test-result-cgo-unit
        merge-multiple: false

    - name: List downloaded artifacts
      run: |
        set -euo pipefail
        echo "Downloaded unit test result artifacts:"
        find test-results -type f -name "*.json" | sort
        echo ""
        echo "Total JSON files: $(find test-results -type f -name \"*.json\" | wc -l)"

    - name: Extract executed tests from artifacts
      run: |
        set -euo pipefail
        echo "Extracting test names from JSON artifacts..."
        ./scripts/extract-executed-tests.sh test-results > executed-tests.txt
        echo "Found $(wc -l < executed-tests.txt) executed tests"

    - name: Compare test coverage
      run: |
        ./scripts/compare-test-coverage.sh all-tests.txt executed-tests.txt

    - name: Upload test coverage report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: test-coverage-analysis-cgo
        path: |
          all-tests.txt
          executed-tests.txt
        retention-days: 7

  impacted-go-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-impacted-go-tests
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Run impacted Go unit tests
      env:
        GH_TOKEN: ${{ github.token }}
      run: make test-impacted-go BASE_REF=origin/main CI_COVERAGE_SOURCE_BRANCH=main

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-build
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
    - name: Set up Node.js
      id: setup-node
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f   # v6
      with:
        node-version: "24"
        cache: npm
        cache-dependency-path: actions/setup/js/package-lock.json
    - name: Report Node cache status
      run: |
        if [ "${{ steps.setup-node.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Node cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Node cache miss" >> $GITHUB_STEP_SUMMARY
        fi
    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true
    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi
    - name: npm ci
      run: npm ci
      working-directory: ./actions/setup/js
    - name: Build code
      run: make build

    - name: Upload Linux binary
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: gh-aw-linux-amd64
        path: gh-aw
        retention-days: 7

    - name: Report binary download instructions
      run: |
        RUN_ID="${{ github.run_id }}"
        REPO="${{ github.repository }}"
        SHA="${{ github.sha }}"
        echo "## 📦 gh-aw Binary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The \`gh-aw\` Linux (amd64) binary has been uploaded as an artifact." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Download with GitHub CLI" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "gh run download ${RUN_ID} --repo ${REPO} --name gh-aw-linux-amd64" >> $GITHUB_STEP_SUMMARY
        echo "chmod +x gh-aw" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Download with curl" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "# Requires a GitHub token with actions:read scope" >> $GITHUB_STEP_SUMMARY
        echo "ARTIFACT_ID=\$(curl -fsSL -H \"Authorization: Bearer \$GH_TOKEN\" \\" >> $GITHUB_STEP_SUMMARY
        echo "  \"https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts\" \\" >> $GITHUB_STEP_SUMMARY
        echo "  | jq -r '.artifacts[] | select(.name==\"gh-aw-linux-amd64\") | .id')" >> $GITHUB_STEP_SUMMARY
        echo "curl -fsSL -H \"Authorization: Bearer \$GH_TOKEN\" \\" >> $GITHUB_STEP_SUMMARY
        echo "  -L \"https://api.github.com/repos/${REPO}/actions/artifacts/\$ARTIFACT_ID/zip\" \\" >> $GITHUB_STEP_SUMMARY
        echo "  -o gh-aw-linux-amd64.zip" >> $GITHUB_STEP_SUMMARY
        echo "unzip gh-aw-linux-amd64.zip && chmod +x gh-aw" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Recompile workflows with this build" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "./gh-aw compile --action-mode release --action-tag ${SHA}" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    - name: Rebuild lock files
      run: make recompile
      env:
        GH_TOKEN: ${{ github.token }}

  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-build-wasm
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          # Use -x for verbose output to see what's being downloaded
          if go mod download -x; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            EXIT_CODE=$?
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts (exit code: $EXIT_CODE)"
              echo "This indicates that proxy.golang.org is unreachable or returning errors"
              echo ""
              echo "Diagnostic information:"
              echo "- GOPROXY: $(go env GOPROXY)"
              echo "- GOSUMDB: $(go env GOSUMDB)"
              echo "- Network connectivity: checking proxy.golang.org..."
              if curl -s -I --connect-timeout 5 https://proxy.golang.org/golang.org/@v/list >/dev/null 2>&1; then
                echo "  ✓ proxy.golang.org is reachable"
              else
                echo "  ✗ proxy.golang.org is NOT reachable"
              fi
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Build WebAssembly binary
      run: make build-wasm

    - name: Report binary size
      run: |
        echo "## WebAssembly Build" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if ls gh-aw.wasm 1>/dev/null 2>&1; then
          SIZE=$(stat --format="%s" gh-aw.wasm)
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE/1048576}")
          echo "✅ Build succeeded" >> $GITHUB_STEP_SUMMARY
          echo "- **Binary:** gh-aw.wasm" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${SIZE_MB} MB (${SIZE} bytes)" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ No .wasm binary found" >> $GITHUB_STEP_SUMMARY
          ls -la *.wasm 2>/dev/null || echo "No wasm files in working directory" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: Run wasm golden tests (Go string API)
      run: make test-wasm-golden

    - name: Set up Node.js
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f   # v6
      with:
        node-version: '24'

    - name: Run wasm binary golden tests (Node.js)
      run: node scripts/test-wasm-golden.mjs

  validate-yaml:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Check for ANSI escape sequences in YAML files
      run: |
        echo "🔍 Scanning YAML workflow files for ANSI escape sequences..."

        # Find all YAML files in .github/workflows directory
        YAML_FILES=$(find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) | sort)

        # Track if any ANSI codes are found
        FOUND_ANSI=0

        # Check each file for ANSI escape sequences
        for file in $YAML_FILES; do
          # Use grep to find ANSI escape sequences (ESC [ ... letter)
          # The pattern matches: \x1b followed by [ followed by optional digits/semicolons followed by a letter
          if grep -P '\x1b\[[0-9;]*[a-zA-Z]' "$file" > /dev/null 2>&1; then
            echo "❌ ERROR: Found ANSI escape sequences in: $file"
            echo ""
            echo "Lines with ANSI codes:"
            grep -n -P '\x1b\[[0-9;]*[a-zA-Z]' "$file" || true
            echo ""
            FOUND_ANSI=1
          fi
        done

        if [ $FOUND_ANSI -eq 1 ]; then
          echo ""
          echo "💡 ANSI escape sequences detected in YAML files!"
          echo ""
          echo "These are terminal color codes that break YAML parsing."
          echo "Common causes:"
          echo "  - Copy-pasting from colored terminal output"
          echo "  - Text editors preserving ANSI codes"
          echo "  - Scripts generating colored output"
          echo ""
          echo "To fix:"
          echo "  1. Remove the ANSI codes from the affected files"
          echo "  2. Run 'make recompile' to regenerate workflow files"
          echo "  3. Use '--no-color' flags when capturing command output"
          echo ""
          exit 1
        fi

        echo "✅ No ANSI escape sequences found in YAML files"

    - name: Check for release-compiled lock files
      run: |
        echo "🔍 Checking .lock.yml files for release build compilation..."

        # Find all .lock.yml files in the repository
        LOCK_FILES=$(find . -type f -name "*.lock.yml" | sort)

        if [ -z "$LOCK_FILES" ]; then
          echo "⚠️  WARNING: No .lock.yml files found"
          exit 0
        fi

        # Track if any release-compiled files are found
        FOUND_RELEASE=0

        # Check each file for release-build markers.
        # Release builds include version like: "# This file was automatically generated by gh-aw (v1.0.0). DO NOT EDIT."
        # Dev builds do not: "# This file was automatically generated by gh-aw. DO NOT EDIT."
        for file in $LOCK_FILES; do
          # Release-compiled lock files can be identified by either:
          # 1. Header marker with version suffix (legacy): "...generated by gh-aw (vX.Y.Z)."
          # 2. Metadata marker: compiler_version field in gh-aw-metadata.
          HEADER_MARKER=$(grep -E '^# This file was automatically generated by gh-aw \([v0-9]' "$file" || true)
          METADATA_MARKER=$(grep -E '^# gh-aw-metadata: .*"compiler_version":' "$file" || true)
          if [ -n "$HEADER_MARKER$METADATA_MARKER" ]; then
            echo "❌ ERROR: Found release-compiled lock file: $file"
            echo ""
            echo "Release-build marker(s):"
            printf '%s\n%s\n' "$HEADER_MARKER" "$METADATA_MARKER" | sed '/^$/d'
            echo ""
            FOUND_RELEASE=1
          fi
        done

        if [ $FOUND_RELEASE -eq 1 ]; then
          echo ""
          echo "💡 Lock files should NOT be compiled with a release build!"
          echo ""
          echo "Lock files in the repository must be compiled with development builds."
          echo "Release builds include version markers (header or metadata), which should only"
          echo "appear in released binaries, not in source-controlled workflow files."
          echo ""
          echo "To fix:"
          echo "  1. Build the CLI with 'make build' (dev build, no release flag)"
          echo "  2. Run 'make recompile' to regenerate all lock files"
          echo "  3. Commit the updated lock files"
          echo ""
          echo "The release build flag is only set during the release process via:"
          echo "  scripts/build-release.sh (sets -X main.isRelease=true)"
          echo ""
          exit 1
        fi

        echo "✅ All lock files compiled with development build (no release markers)"

    - name: Check skill file URLs use main branch
      run: |
        echo "🔍 Checking .github/skills/agentic-workflows/SKILL.md for correct branch URLs..."

        AGENT_FILE=".github/skills/agentic-workflows/SKILL.md"

        if [ ! -f "$AGENT_FILE" ]; then
          echo "⚠️  WARNING: $AGENT_FILE not found, skipping check"
          exit 0
        fi

        # Check for URLs that don't use 'main' branch
        # Pattern matches: https://github.com/github/gh-aw/blob/{anything-except-main}/
        # Uses negative lookahead to exclude 'main'
        INVALID_URLS=$(grep -n 'https://github.com/github/gh-aw/blob/' "$AGENT_FILE" | grep -v '/blob/main/' || true)

        if [ -n "$INVALID_URLS" ]; then
          echo "❌ ERROR: Found URLs not using 'main' branch in $AGENT_FILE"
          echo ""
          echo "Lines with invalid URLs:"
          echo "$INVALID_URLS"
          echo ""
          echo "💡 All GitHub URLs in skill files must reference the 'main' branch!"
          echo ""
          echo "URLs should use the pattern:"
          echo "  https://github.com/github/gh-aw/blob/main/.github/aw/..."
          echo ""
          echo "To fix:"
          echo "  1. Edit $AGENT_FILE"
          echo "  2. Replace all 'blob/{commit-hash}/' or 'blob/{tag}/' with 'blob/main/'"
          echo "  3. Commit the updated file"
          echo ""
          exit 1
        fi

        echo "✅ All URLs in $AGENT_FILE correctly use 'main' branch"

    - name: Validate releases.json structure and version formats
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3   # v9
      with:
        script: |
          const fs = require('fs');
          const CONFIG_FILE = '.github/aw/releases.json';
          const SCHEMA_FILE = '.github/aw/releases.schema.json';

          core.info(`🔍 Validating ${CONFIG_FILE} against ${SCHEMA_FILE}...`);

          if (!fs.existsSync(CONFIG_FILE)) {
            core.setFailed(`ERROR: ${CONFIG_FILE} not found`);
            return;
          }
          if (!fs.existsSync(SCHEMA_FILE)) {
            core.setFailed(`ERROR: ${SCHEMA_FILE} not found`);
            return;
          }

          let config;
          try {
            config = JSON.parse(fs.readFileSync(CONFIG_FILE, 'utf8'));
          } catch (err) {
            core.setFailed(`ERROR: ${CONFIG_FILE} is not valid JSON: ${err.message}`);
            return;
          }
          core.info(`✅ ${CONFIG_FILE} is valid JSON`);

          const errors = [];

          // Check additionalProperties (only allow known keys)
          const allowedKeys = new Set(['$schema', 'blockedVersions', 'minimumVersion', 'minRecommendedVersion']);
          for (const key of Object.keys(config)) {
            if (!allowedKeys.has(key)) {
              errors.push(`Unknown property: '${key}'`);
            }
          }

          // Validate blockedVersions
          if ('blockedVersions' in config) {
            const bv = config.blockedVersions;
            if (!Array.isArray(bv)) {
              errors.push("'blockedVersions' must be an array");
            } else {
              const versionPattern = /^v[0-9]+\.[0-9]+\.[0-9]+$/;
              const seen = new Set();
              bv.forEach((v, i) => {
                if (typeof v !== 'string') {
                  errors.push(`'blockedVersions[${i}]' must be a string`);
                } else if (!versionPattern.test(v)) {
                  errors.push(`'blockedVersions[${i}]' ('${v}') does not match expected version pattern (vMAJOR.MINOR.PATCH, e.g. 'v1.2.3')`);
                } else if (seen.has(v)) {
                  errors.push(`'blockedVersions' contains duplicate entry: '${v}'`);
                } else {
                  seen.add(v);
                }
              });
            }
          }

          // Validate minimumVersion
          if ('minimumVersion' in config) {
            const mv = config.minimumVersion;
            if (typeof mv !== 'string') {
              errors.push("'minimumVersion' must be a string");
            } else if (mv !== '' && !/^v[0-9]+\.[0-9]+\.[0-9]+$/.test(mv)) {
              errors.push(`'minimumVersion' ('${mv}') does not match expected version pattern (vMAJOR.MINOR.PATCH, e.g. 'v1.2.3' or empty string)`);
            }
          }

          // Validate minRecommendedVersion
          if ('minRecommendedVersion' in config) {
            const mrv = config.minRecommendedVersion;
            if (typeof mrv !== 'string') {
              errors.push("'minRecommendedVersion' must be a string");
            } else if (mrv !== '' && !/^v[0-9]+\.[0-9]+\.[0-9]+$/.test(mrv)) {
              errors.push(`'minRecommendedVersion' ('${mrv}') does not match expected version pattern (vMAJOR.MINOR.PATCH, e.g. 'v1.2.3' or empty string)`);
            }
          }

          if (errors.length > 0) {
            core.setFailed(`❌ ${CONFIG_FILE} schema validation failed:\n${errors.map(e => `  - ${e}`).join('\n')}`);
            return;
          }

          core.info(`✅ ${CONFIG_FILE} is valid and conforms to ${SCHEMA_FILE}`);

    - name: Validate compat.json structure and version formats
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3   # v9
      with:
        script: |
          const fs = require('fs');
          const CONFIG_FILE = '.github/aw/compat.json';
          const SCHEMA_FILE = '.github/aw/compat.schema.json';

          core.info(`🔍 Validating ${CONFIG_FILE} (shape per ${SCHEMA_FILE} + cross-row invariants)...`);

          if (!fs.existsSync(CONFIG_FILE)) {
            core.setFailed(`ERROR: ${CONFIG_FILE} not found`);
            return;
          }
          if (!fs.existsSync(SCHEMA_FILE)) {
            core.setFailed(`ERROR: ${SCHEMA_FILE} not found`);
            return;
          }

          let config;
          try {
            config = JSON.parse(fs.readFileSync(CONFIG_FILE, 'utf8'));
          } catch (err) {
            core.setFailed(`ERROR: ${CONFIG_FILE} is not valid JSON: ${err.message}`);
            return;
          }
          core.info(`✅ ${CONFIG_FILE} is valid JSON`);

          const errors = [];
          const allowedTopKeys = new Set(['$schema', 'blockedVersions', 'minimumVersion', 'minRecommendedVersion', 'agent-compat-v1']);
          for (const key of Object.keys(config)) {
            if (!allowedTopKeys.has(key)) {
              errors.push(`Unknown top-level property: '${key}'`);
            }
          }

          const releaseVersionRe = /^v[0-9]+\.[0-9]+\.[0-9]+$/;
          if ('blockedVersions' in config) {
            if (!Array.isArray(config.blockedVersions)) {
              errors.push("'blockedVersions' must be an array");
            } else {
              const seenBlocked = new Set();
              config.blockedVersions.forEach((v, i) => {
                if (typeof v !== 'string') {
                  errors.push(`blockedVersions[${i}] must be a string`);
                  return;
                }
                if (!releaseVersionRe.test(v)) {
                  errors.push(`blockedVersions[${i}] ('${v}') must match vMAJOR.MINOR.PATCH`);
                }
                if (seenBlocked.has(v)) {
                  errors.push(`blockedVersions contains duplicate entry '${v}'`);
                }
                seenBlocked.add(v);
              });
            }
          }
          if ('minimumVersion' in config) {
            const mv = config.minimumVersion;
            if (typeof mv !== 'string') {
              errors.push("'minimumVersion' must be a string");
            } else if (!(mv === '' || releaseVersionRe.test(mv))) {
              errors.push(`'minimumVersion' ('${mv}') does not match expected version pattern (vMAJOR.MINOR.PATCH or empty string)`);
            }
          }
          if ('minRecommendedVersion' in config) {
            const mrv = config.minRecommendedVersion;
            if (typeof mrv !== 'string') {
              errors.push("'minRecommendedVersion' must be a string");
            } else if (!(mrv === '' || releaseVersionRe.test(mrv))) {
              errors.push(`'minRecommendedVersion' ('${mrv}') does not match expected version pattern (vMAJOR.MINOR.PATCH or empty string)`);
            }
          }

          const matrix = config['agent-compat-v1'];
          if (typeof matrix !== 'object' || matrix === null || Array.isArray(matrix)) {
            core.setFailed(`ERROR: 'agent-compat-v1' must be an object`);
            return;
          }

          const semverRe = /^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$/;
          // Full semver 2.0.0 compare: base triplet, then prerelease identifiers
          // (numeric < non-numeric, all-prerelease < no-prerelease).
          const parseSemver = (v) => {
            const m = /^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/.exec(v);
            if (!m) return null;
            return {
              base: [Number(m[1]), Number(m[2]), Number(m[3])],
              pre: m[4] ? m[4].split('.') : null,
            };
          };
          const cmp = (a, b) => {
            const A = parseSemver(a);
            const B = parseSemver(b);
            if (!A || !B) throw new Error(`cmp() called with non-semver: '${a}' / '${b}'`);
            for (let i = 0; i < 3; i++) {
              if (A.base[i] !== B.base[i]) return A.base[i] - B.base[i];
            }
            if (A.pre === null && B.pre === null) return 0;
            if (A.pre === null) return 1;
            if (B.pre === null) return -1;
            const len = Math.max(A.pre.length, B.pre.length);
            for (let i = 0; i < len; i++) {
              if (i >= A.pre.length) return -1;
              if (i >= B.pre.length) return 1;
              const ai = A.pre[i], bi = B.pre[i];
              const aN = /^\d+$/.test(ai), bN = /^\d+$/.test(bi);
              if (aN && bN) {
                const da = Number(ai), db = Number(bi);
                if (da !== db) return da - db;
              } else if (aN) return -1;
              else if (bN) return 1;
              else if (ai !== bi) return ai < bi ? -1 : 1;
            }
            return 0;
          };
          // Compare gh-aw bounds where '*' means +infinity (only valid on max-gh-aw).
          const cmpGhAw = (a, b) => {
            if (a === '*' && b === '*') return 0;
            if (a === '*') return 1;
            if (b === '*') return -1;
            return cmp(a, b);
          };

          if ('cache-ttl-days' in matrix) {
            const ttl = matrix['cache-ttl-days'];
            if (!Number.isInteger(ttl) || ttl < 1) {
              errors.push(`'agent-compat-v1.cache-ttl-days' must be a positive integer (got ${JSON.stringify(ttl)})`);
            }
          }

          // Keep the agent names here in sync with agent-compat-v1.properties in compat.schema.json.
          const allowedAgentKeys = new Set(['cache-ttl-days', 'copilot', 'claude']);
          for (const key of Object.keys(matrix)) {
            if (!allowedAgentKeys.has(key)) {
              errors.push(`Unknown property under 'agent-compat-v1': '${key}'`);
            }
          }

          for (const [agent, rows] of Object.entries(matrix)) {
            if (agent === 'cache-ttl-days') continue;
            if (!Array.isArray(rows) || rows.length < 1) {
              errors.push(`'agent-compat-v1.${agent}' must be a non-empty array`);
              continue;
            }
            const allowedRowKeys = new Set(['min-gh-aw', 'max-gh-aw', 'min-agent', 'max-agent', 'open']);
            const requiredRowKeys = ['min-gh-aw', 'max-gh-aw', 'min-agent', 'max-agent'];

            rows.forEach((row, idx) => {
              const where = `${agent}[${idx}]`;
              if (typeof row !== 'object' || row === null || Array.isArray(row)) {
                errors.push(`${where} must be an object`);
                return;
              }
              for (const key of Object.keys(row)) {
                if (!allowedRowKeys.has(key)) {
                  errors.push(`${where} has unknown property '${key}'`);
                }
              }
              for (const key of requiredRowKeys) {
                if (!(key in row)) {
                  errors.push(`${where} is missing required property '${key}'`);
                }
              }

              for (const k of ['min-gh-aw', 'min-agent', 'max-agent']) {
                if (k in row && !semverRe.test(row[k])) {
                  errors.push(`${where}.${k} ('${row[k]}') is not a valid semver (MAJOR.MINOR.PATCH)`);
                }
              }
              if ('max-gh-aw' in row && row['max-gh-aw'] !== '*' && !semverRe.test(row['max-gh-aw'])) {
                errors.push(`${where}.max-gh-aw ('${row['max-gh-aw']}') must be either '*' or a valid semver`);
              }

              if ('min-agent' in row && 'max-agent' in row && semverRe.test(row['min-agent']) && semverRe.test(row['max-agent'])) {
                if (cmp(row['min-agent'], row['max-agent']) > 0) {
                  errors.push(`${where}: min-agent (${row['min-agent']}) must be <= max-agent (${row['max-agent']})`);
                }
              }

              if (row['max-gh-aw'] === '*') {
                if ('open' in row && typeof row['open'] !== 'boolean') {
                  errors.push(`${where}.open must be a boolean`);
                }
              } else if ('max-gh-aw' in row) {
                if (semverRe.test(row['min-gh-aw']) && semverRe.test(row['max-gh-aw'])) {
                  if (cmp(row['min-gh-aw'], row['max-gh-aw']) > 0) {
                    errors.push(`${where}: min-gh-aw (${row['min-gh-aw']}) must be <= max-gh-aw (${row['max-gh-aw']})`);
                  }
                }
                if ('open' in row) {
                  errors.push(`${where}: 'open' is only permitted on the catch-all row (max-gh-aw '*'); bounded rows are closed-by-construction`);
                }
              }
            });

            for (let i = 0; i < rows.length; i++) {
              for (let j = i + 1; j < rows.length; j++) {
                const a = rows[i];
                const b = rows[j];
                // Skip non-object rows (already reported above) so we do not throw on a/b['min-gh-aw'].
                if (typeof a !== 'object' || a === null || Array.isArray(a)) continue;
                if (typeof b !== 'object' || b === null || Array.isArray(b)) continue;
                if (![a['min-gh-aw'], a['max-gh-aw'], b['min-gh-aw'], b['max-gh-aw']].every(v => v === '*' || semverRe.test(v))) continue;
                // Ranges are closed/inclusive on both ends; two rows that share a boundary version count as overlapping.
                if (cmpGhAw(a['min-gh-aw'], b['max-gh-aw']) <= 0 && cmpGhAw(b['min-gh-aw'], a['max-gh-aw']) <= 0) {
                  errors.push(`${agent}: rows [${i}] and [${j}] have overlapping gh-aw ranges (${a['min-gh-aw']}..${a['max-gh-aw']} vs ${b['min-gh-aw']}..${b['max-gh-aw']})`);
                }
              }
            }
          }

          if (errors.length > 0) {
            core.setFailed(`❌ ${CONFIG_FILE} validation failed:\n${errors.map(e => `  - ${e}`).join('\n')}`);
            return;
          }

          core.info(`✅ ${CONFIG_FILE} passes all structural and cross-row invariant checks`);

  bench:
    # Only run benchmarks on main branch for performance tracking
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    concurrency:
      group: ci-${{ github.ref }}-bench
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          if go mod download; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
              echo "This may indicate that proxy.golang.org is unreachable"
              echo "Please check network connectivity or consider vendoring dependencies"
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260615155930-9e4b9ddef5b6

    - name: Download previous benchmark baseline
      id: baseline
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        echo "Looking for previous benchmark-results artifact..."
        # The bench job only runs on main, so any benchmark-results artifact is from main.
        # The artifacts API includes workflow_run.head_branch; filter for main as an extra safeguard.
        artifact_id=$(gh api \
          "repos/$GITHUB_REPOSITORY/actions/artifacts?name=benchmark-results&per_page=10" \
          --jq '[.artifacts[] | select(.workflow_run.head_branch? == "main")] | .[0].id // empty' 2>/dev/null)

        if [ -n "$artifact_id" ]; then
          echo "Found artifact ID: $artifact_id"
          mkdir -p baseline
          if gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" \
            --output baseline.zip 2>/dev/null; then
            if unzip -q baseline.zip -d baseline 2>/dev/null && [ -f baseline/bench_results.txt ]; then
              echo "✅ Downloaded baseline benchmark results"
              echo "has_baseline=true" >> "$GITHUB_OUTPUT"
            else
              echo "⚠️ Failed to extract baseline artifact or bench_results.txt not found"
              echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "⚠️ Failed to download baseline artifact"
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "ℹ️ No previous benchmark results found — skipping regression check on first run"
          echo "has_baseline=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Run benchmarks
      run: make bench

    - name: Run benchstat regression check
      if: steps.baseline.outputs.has_baseline == 'true'
      run: |
        echo "## 📈 Benchmark Regression Check" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if ! benchstat_out=$(benchstat baseline/bench_results.txt bench_results.txt 2>&1); then
          echo "$benchstat_out"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$benchstat_out" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ **benchstat failed to compare benchmark results.** Check the output above." >> $GITHUB_STEP_SUMMARY
          echo "::error::benchstat failed to compare benchmark results"
          exit 1
        fi

        echo "$benchstat_out"

        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "$benchstat_out" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        # Fail if any benchmark regresses by more than 10%.
        # benchstat uses + for slower time (regression) and - for faster time (improvement).
        REGRESSION=false
        while IFS= read -r line; do
          if [[ "$line" =~ \+([0-9]+(\.[0-9]+)?)% ]]; then
            pct="${BASH_REMATCH[1]}"
            if awk -v p="$pct" 'BEGIN {exit !(p > 10)}'; then
              echo "❌ Regression: $line"
              REGRESSION=true
            fi
          fi
        done <<< "$benchstat_out"

        if [ "$REGRESSION" = "true" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ **Performance regression >10% detected.** See comparison above." >> $GITHUB_STEP_SUMMARY
          echo "::error::Performance regression >10% detected — see benchstat output above"
          exit 1
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ No significant performance regressions detected." >> $GITHUB_STEP_SUMMARY
          echo "✅ No regressions detected"
        fi

    - name: Display benchmark summary
      run: |
        echo "## 📊 Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        # Show compiler benchmarks from the results
        grep "BenchmarkCompile" bench_results.txt | head -20 >> $GITHUB_STEP_SUMMARY || echo "No benchmark results found" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📁 Full results saved to artifact: benchmark-results" >> $GITHUB_STEP_SUMMARY

      # Benchmark results for performance trend analysis - 14 days allows comparison across multiple runs
    - name: Save benchmark results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: benchmark-results
        path: bench_results.txt
        if-no-files-found: ignore
        retention-days: 14

  check-validator-sizes:
    name: Check validator file sizes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Non-blocking: report violations but don't fail the build until existing files are cleaned up
    continue-on-error: true
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Check validator file sizes
      id: check
      run: |
        set +e
        OUTPUT=$(NO_COLOR=1 bash scripts/check-validator-sizes.sh 2>&1)
        EXIT_CODE=$?
        echo "$OUTPUT"
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
        echo "## Validator File Size Check" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Checking \`*_validation.go\` files against the 768-line hard limit (AGENTS.md)." >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
        echo "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
        echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "⚠️ This check is currently non-blocking. Fix violations to keep the codebase healthy." >> "$GITHUB_STEP_SUMMARY"
        fi
        exit "$EXIT_CODE"

  lint-go:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-lint-go
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
      with:
        fetch-depth: 0    # Fetch all history for incremental linting

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

      # Go formatting check (fast, no deps needed)
    - name: Check Go formatting
      run: |
        unformatted=$(go fmt ./...)
        if [ -n "$unformatted" ]; then
          echo "❌ Code is not formatted. Run 'make fmt' to fix." >> $GITHUB_STEP_SUMMARY
          echo "Unformatted files:" >> $GITHUB_STEP_SUMMARY
          echo "$unformatted" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "To fix this locally, run:"
          echo "  make fmt"
          echo ""
          echo "Or format individual files with:"
          echo "  go fmt ./path/to/file.go"
          exit 1
        fi
        echo "✅ Go formatting check passed" >> $GITHUB_STEP_SUMMARY

      # Install golangci-lint binary (avoiding GPL dependencies)
      # Downloads pre-built binary from GitHub releases instead of using go install
    - name: Install golangci-lint
      run: |
        GOLANGCI_LINT_VERSION="v2.12.2"
        GOOS=$(go env GOOS)
        GOARCH=$(go env GOARCH)
        GOPATH=$(go env GOPATH)
        BINARY_NAME="golangci-lint"

        echo "Installing golangci-lint $GOLANGCI_LINT_VERSION for $GOOS/$GOARCH..."
        DOWNLOAD_URL="https://github.com/golangci/golangci-lint/releases/download/$GOLANGCI_LINT_VERSION/golangci-lint-${GOLANGCI_LINT_VERSION#v}-$GOOS-$GOARCH.tar.gz"
        ARCHIVE="/tmp/golangci-lint.tar.gz"

        # Save archive to disk first so we can verify it before extracting.
        # --fail causes curl to exit non-zero on HTTP errors (4xx/5xx),
        # --retry 3 retries transient network failures automatically.
        curl --fail --retry 3 -sSL "$DOWNLOAD_URL" -o "$ARCHIVE"
        tar -xz -C /tmp -f "$ARCHIVE"
        mkdir -p "$GOPATH/bin"
        mv /tmp/golangci-lint-*/$BINARY_NAME "$GOPATH/bin/$BINARY_NAME"
        chmod +x "$GOPATH/bin/$BINARY_NAME"

        echo "✓ golangci-lint $GOLANGCI_LINT_VERSION installed"
        "$GOPATH/bin/$BINARY_NAME" version

      # Run golangci-lint via Makefile for consistency
      # Uses incremental linting on PRs for faster CI (50-75% speedup)
      # Performance optimizations in .golangci.yml:
      # - timeout: 5m prevents hanging
      # - modules-download-mode: readonly uses cached modules only
    - name: Run golangci-lint
      run: |
        export PATH="$PATH:$(go env GOPATH)/bin"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          # Incremental linting on PRs - only check changed files
          # This provides 50-75% faster linting on typical PRs
          BASE_REF="origin/${{ github.base_ref }}"
          if git rev-parse --verify "$BASE_REF" >/dev/null 2>&1; then
            echo "Using incremental lint against $BASE_REF"
            make golint-incremental BASE_REF="$BASE_REF"
          else
            echo "⚠️ Base ref $BASE_REF not found, falling back to full lint"
            make golint
          fi
        else
          # Full scan on main branch to ensure comprehensive coverage
          make golint
        fi

      # Error message linting (requires Go only)
    - name: Lint error messages
      run: make lint-errors

      # Enforce selected production custom analyzers without blocking on unrelated
      # legacy custom analyzer findings in tests or other analyzer families.
      # Note: -test=false intentionally scopes this gate to production code only.
    - name: Run custom linters
      run: make golint-custom LINTER_FLAGS="-errstringmatch -panicinlibrarycode -manualmutexunlock -osexitinlibrary -rawloginlib -logfatallibrary -regexpcompileinfunction -fprintlnsprintf -strconvparseignorederror -jsonmarshalignoredeerror -uncheckedtypeassertion -fmterrorfnoverbs -tolowerequalfold -httpnoctx -timeafterleak -errortypeassertion -execcommandwithoutcontext -sprintfint -stringsindexcontains -stringscountcontains -test=false"

    - name: Run custom linters (wasm)
      run: GOOS=js GOARCH=wasm make golint-custom LINTER_FLAGS="-errstringmatch -panicinlibrarycode -manualmutexunlock -osexitinlibrary -rawloginlib -logfatallibrary -regexpcompileinfunction -fprintlnsprintf -strconvparseignorederror -jsonmarshalignoredeerror -uncheckedtypeassertion -fmterrorfnoverbs -tolowerequalfold -httpnoctx -timeafterleak -errortypeassertion -execcommandwithoutcontext -sprintfint -stringsindexcontains -stringscountcontains -test=false" LINTER_PACKAGES="./pkg/console ./pkg/parser ./pkg/styles ./pkg/tty ./pkg/workflow"

      # Ensure no action shell scripts invoke python or python3
    - name: Lint action shell scripts
      run: make lint-action-sh

  actions-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-actions-build
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          if go mod download; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
              echo "This may indicate that proxy.golang.org is unreachable"
              echo "Please check network connectivity or consider vendoring dependencies"
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Build actions
      run: make actions-build

    - name: Validate actions
