    concurrency:
      group: ci-${{ github.ref }}-cross-platform-${{ matrix.os }}
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      shell: bash
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          if go mod download; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
              echo "This may indicate that proxy.golang.org is unreachable"
              echo "Please check network connectivity or consider vendoring dependencies"
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Build gh-aw binary
      run: make build

    - name: Scan built binary with Microsoft Defender
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $workspaceBinaryPath = Join-Path $PWD "gh-aw.exe"
        if (-not (Test-Path -Path $workspaceBinaryPath -PathType Leaf)) {
          Write-Host "Current directory: $($PWD.Path)"
          Write-Host "Directory contents:"
          Get-ChildItem -Name | ForEach-Object { Write-Host " - $_" }
          Write-Error "Built binary not found: $workspaceBinaryPath"
          exit 1
        }
        $workspaceBinaryPath = (Resolve-Path -Path $workspaceBinaryPath).Path

        # Stabilize file before scanning to avoid transient build/link races.
        $stabilizationDelaySeconds = 3
        $initialBinaryItem = Get-Item -LiteralPath $workspaceBinaryPath
        Start-Sleep -Seconds $stabilizationDelaySeconds
        $stableBinaryItem = Get-Item -LiteralPath $workspaceBinaryPath
        if (
          $initialBinaryItem.Length -ne $stableBinaryItem.Length -or
          $initialBinaryItem.LastWriteTimeUtc -ne $stableBinaryItem.LastWriteTimeUtc
        ) {
          Write-Error "Built binary changed during stabilization window (${stabilizationDelaySeconds}s): $workspaceBinaryPath"
          Write-Error "Initial: size=$($initialBinaryItem.Length), lastWriteUtc=$($initialBinaryItem.LastWriteTimeUtc)"
          Write-Error "Current: size=$($stableBinaryItem.Length), lastWriteUtc=$($stableBinaryItem.LastWriteTimeUtc)"
          exit 1
        }
        $workspaceBinaryHash = (Get-FileHash -LiteralPath $workspaceBinaryPath -Algorithm SHA256).Hash

        # Copy to a dedicated scan directory instead of scanning directly under D:\a\ workspace.
        $scanBaseRoot = $env:TEMP
        if (-not $scanBaseRoot) {
          $scanBaseRoot = "C:\Temp"
        }
        $scanBasePath = Join-Path $scanBaseRoot "defender-scan"
        New-Item -ItemType Directory -Path $scanBasePath -Force | Out-Null
        $scanFileName = "scan-$([guid]::NewGuid().ToString('N')).exe"
        $binaryPath = Join-Path $scanBasePath $scanFileName
        Copy-Item -LiteralPath $workspaceBinaryPath -Destination $binaryPath -Force
        if (-not (Test-Path -Path $binaryPath -PathType Leaf)) {
          Write-Error "Copied scan target not found: $binaryPath"
          exit 1
        }
        $binaryPath = (Resolve-Path -Path $binaryPath).Path
        $workspaceRoot = $null
        if ($env:GITHUB_WORKSPACE -and (Test-Path -Path $env:GITHUB_WORKSPACE -PathType Container)) {
          $workspaceRoot = (Resolve-Path -Path $env:GITHUB_WORKSPACE).Path
        }
        if ($workspaceRoot -and $binaryPath.StartsWith($workspaceRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
          Write-Error "Refusing to scan from workspace path: $binaryPath"
          exit 1
        }

        # Validate copied file integrity before scanning.
        $scanBinaryItem = Get-Item -LiteralPath $binaryPath
        $scanBinaryHash = (Get-FileHash -LiteralPath $binaryPath -Algorithm SHA256).Hash
        if ($scanBinaryItem.Length -ne $stableBinaryItem.Length) {
          Write-Error "Copied file size mismatch: source=$($stableBinaryItem.Length), copy=$($scanBinaryItem.Length)"
          exit 1
        }
        if ($scanBinaryHash -ne $workspaceBinaryHash) {
          Write-Error "Copied file hash mismatch: source=$workspaceBinaryHash, copy=$scanBinaryHash"
          exit 1
        }

        $mpCmdRun = Join-Path $env:ProgramFiles "Windows Defender\MpCmdRun.exe"
        if (-not (Test-Path $mpCmdRun)) {
          $programFilesX86 = (Get-Item -Path "Env:ProgramFiles(x86)" -ErrorAction SilentlyContinue).Value
          if ($programFilesX86) {
            $mpCmdRun = Join-Path $programFilesX86 "Windows Defender\MpCmdRun.exe"
          }
        }
        if (-not (Test-Path $mpCmdRun)) {
          Write-Error "Microsoft Defender CLI not found (MpCmdRun.exe)"
          exit 1
        }

        # Log Defender status, preference, and execution details for diagnostics.
        Write-Host "=== Microsoft Defender diagnostic info ==="
        try {
          $mpStatus = Get-MpComputerStatus
        } catch {
          $mpStatus = $null
          Write-Host "Could not query Microsoft Defender status: $_"
        }
        if ($mpStatus) {
          Write-Host "AntivirusEnabled:         $($mpStatus.AntivirusEnabled)"
          Write-Host "RealTimeProtectionEnabled: $($mpStatus.RealTimeProtectionEnabled)"
          Write-Host "AntivirusSignatureVersion: $($mpStatus.AntivirusSignatureVersion)"
          Write-Host "AntivirusSignatureLastUpdated: $($mpStatus.AntivirusSignatureLastUpdated)"
          Write-Host "AMProductVersion:          $($mpStatus.AMProductVersion)"
          Write-Host "AMEngineVersion:           $($mpStatus.AMEngineVersion)"
        } else {
          Write-Host "(Get-MpComputerStatus unavailable)"
        }
        try {
          $mpPreference = Get-MpPreference
        } catch {
          $mpPreference = $null
          Write-Host "Could not query Microsoft Defender preferences: $_"
        }
        if ($mpPreference) {
          Write-Host "ExclusionPath:             $(@($mpPreference.ExclusionPath) -join '; ')"
          Write-Host "ExclusionExtension:        $(@($mpPreference.ExclusionExtension) -join '; ')"
          Write-Host "ExclusionProcess:          $(@($mpPreference.ExclusionProcess) -join '; ')"
          Write-Host "ExclusionIpAddress:        $(@($mpPreference.ExclusionIpAddress) -join '; ')"
        } else {
          Write-Host "(Get-MpPreference unavailable)"
        }
        $winDefendService = Get-Service -Name WinDefend -ErrorAction SilentlyContinue
        if ($winDefendService) {
          Write-Host "WinDefend service status:  $($winDefendService.Status)"
          Write-Host "WinDefend service start:   $($winDefendService.StartType)"
        } else {
          Write-Host "(WinDefend service unavailable)"
        }
        if ($mpStatus) {
          Write-Host "AMRunningMode:             $($mpStatus.AMRunningMode)"
          Write-Host "IoavProtectionEnabled:     $($mpStatus.IoavProtectionEnabled)"
        }
        Write-Host "MpCmdRun.exe path: $mpCmdRun"
        Write-Host "Workspace binary:  $workspaceBinaryPath"
        Write-Host "Workspace size:    $($stableBinaryItem.Length) bytes"
        Write-Host "Workspace SHA256:  $workspaceBinaryHash"
        Write-Host "Binary to scan:    $binaryPath"
        Write-Host "Binary size:       $($scanBinaryItem.Length) bytes"
        Write-Host "Binary SHA256:     $scanBinaryHash"
        Write-Host "=========================================="

        # ScanType 3 = custom scan. Use -File to scan only the copied binary.
        # Capture output (2>&1 merges stderr into the output stream so all
        # MpCmdRun messages are available for strict failure checks below.
        # Retry on transient service errors (e.g. WinDefend in StopPending state,
        # hr = 0x800106ba) which can occur transiently on Windows runners.
        $scanAttempts = 3
        $scanDelaySeconds = 15
        $output = $null
        $scanExitCode = 0
        $outputText = ""
        for ($scanAttempt = 1; $scanAttempt -le $scanAttempts; $scanAttempt++) {
          if ($scanAttempt -gt 1) {
            Write-Host "Retrying Microsoft Defender scan (attempt $scanAttempt/$scanAttempts)..."
          }
          $output = & $mpCmdRun -Scan -ScanType 3 -File $binaryPath -DisableRemediation 2>&1 | ForEach-Object { "$_" }
          $scanExitCode = $LASTEXITCODE
          $outputText = @($output) -join "`n"
          $isTransientError = $scanExitCode -ne 0 -and $outputText -imatch "0x800106ba"
          if (-not $isTransientError -or $scanAttempt -eq $scanAttempts) {
            break
          }
          Write-Warning "Defender scan failed with a transient service error (attempt $scanAttempt/$scanAttempts). Retrying in $scanDelaySeconds seconds..."
          Start-Sleep -Seconds $scanDelaySeconds
        }

        Write-Host "=== MpCmdRun output ==="
        $output | ForEach-Object { Write-Host $_ }
        Write-Host "Exit code: $scanExitCode"
        Write-Host "======================="

        # Write diagnostic info and scan output to a log file for artifact upload.
        $logFile = Join-Path $env:RUNNER_TEMP "defender-scan-log.txt"
        $mpStatusLines = if ($mpStatus) {
          @(
            "AntivirusEnabled: $($mpStatus.AntivirusEnabled)",
            "RealTimeProtectionEnabled: $($mpStatus.RealTimeProtectionEnabled)",
            "AntivirusSignatureVersion: $($mpStatus.AntivirusSignatureVersion)",
            "AntivirusSignatureLastUpdated: $($mpStatus.AntivirusSignatureLastUpdated)",
            "AMProductVersion: $($mpStatus.AMProductVersion)",
            "AMEngineVersion: $($mpStatus.AMEngineVersion)",
            "AMRunningMode: $($mpStatus.AMRunningMode)",
            "IoavProtectionEnabled: $($mpStatus.IoavProtectionEnabled)"
          )
        } else {
          @("(Get-MpComputerStatus unavailable)")
        }
        $mpPrefLines = if ($mpPreference) {
          @(
            "ExclusionPath: $(@($mpPreference.ExclusionPath) -join '; ')",
            "ExclusionExtension: $(@($mpPreference.ExclusionExtension) -join '; ')",
            "ExclusionProcess: $(@($mpPreference.ExclusionProcess) -join '; ')",
            "ExclusionIpAddress: $(@($mpPreference.ExclusionIpAddress) -join '; ')"
          )
        } else {
          @("(Get-MpPreference unavailable)")
        }
        $winDefendLines = if ($winDefendService) {
          @(
            "WinDefend service status: $($winDefendService.Status)",
            "WinDefend service start: $($winDefendService.StartType)"
          )
        } else {
          @("(WinDefend service unavailable)")
        }
        $logContent = @(
          "=== Microsoft Defender diagnostic info ===",
          ($mpStatusLines -join "`n"),
          ($mpPrefLines -join "`n"),
          ($winDefendLines -join "`n"),
          "MpCmdRun.exe path: $mpCmdRun",
          "Workspace binary: $workspaceBinaryPath",
          "Workspace size: $($stableBinaryItem.Length) bytes",
          "Workspace SHA256: $workspaceBinaryHash",
          "Binary to scan: $binaryPath",
          "Binary size: $($scanBinaryItem.Length) bytes",
          "Binary SHA256: $scanBinaryHash",
          "==========================================",
          "",
          "=== MpCmdRun output ===",
          $outputText,
          "Exit code: $scanExitCode",
          "======================="
        ) -join "`n"
        try {
          Set-Content -Path $logFile -Value $logContent -Encoding UTF8
        } catch {
          Write-Host "Warning: could not write defender scan log file: $_"
        }

        # Exit code alone is not enough: explicitly parse output to confirm scan execution.
        $skipped = $output | Where-Object { $_ -imatch "\bwas skipped\b|\bcannot be scanned\b|\bnot performed\b|\b(?:file|scan).*\bexcluded\b" }
        $threatLines = $output | Where-Object { $_ -match "\bThreat\b" }
        $scanStarted = $outputText -imatch "\bScan starting\b"
        $scanFinished = $outputText -imatch "\bScan finished\b"
        if ($scanExitCode -ne 0) {
          Write-Error "Microsoft Defender scan failed with exit code $scanExitCode"
          exit $scanExitCode
        }
        if ($skipped) {
          Write-Error "Microsoft Defender scan was skipped for $binaryPath - the binary was NOT scanned."
          Write-Error "Possible causes: file/path exclusion, stale signatures, or protection disabled."
          # Wrap with @() so a single matched line is joined as one line, not character-by-character.
          Write-Error "Skipped output: $(@($skipped) -join '; ')"
          exit 1
        }
        if ($threatLines) {
          Write-Error "Microsoft Defender reported threat indicators in scan output."
          Write-Error "Threat output: $(@($threatLines) -join '; ')"
          exit 1
        }
        if (-not ($scanStarted -and $scanFinished)) {
          Write-Error "Could not confirm scan completion from MpCmdRun output (expected both 'Scan starting' and 'Scan finished')."
          exit 1
        }

        Write-Host "✅ Microsoft Defender scan completed successfully for $binaryPath"

    - name: Upload Defender scan logs
      if: always() && runner.os == 'Windows'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: defender-scan-log-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ runner.temp }}/defender-scan-log.txt
        retention-days: 7

    - name: Create test workflow
      shell: bash
      run: |
        mkdir -p .github/workflows
        cat > .github/workflows/test-cross-platform.md << 'EOF'
        ---
        on: push
        engine: copilot
        ---
        # Test Workflow for Cross-Platform CI

        This is a simple test workflow to verify the compile command works correctly.

        ## Task
        Echo hello world.
        EOF

    - name: Test compile command
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "Testing compile command on ${{ matrix.os }}..."

        # Determine binary name based on OS
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          BINARY="./gh-aw.exe"
        else
          BINARY="./gh-aw"
        fi

        # Verify binary exists
        if [ ! -f "$BINARY" ]; then
          echo "❌ Binary not found: $BINARY"
          ls -la
          exit 1
        fi

        # Run compile command
        "$BINARY" compile test-cross-platform --verbose

        # Check if lock file was generated
        if [ -f ".github/workflows/test-cross-platform.lock.yml" ]; then
          echo "✅ Compile succeeded - lock file generated"
        else
          echo "❌ Compile failed - no lock file generated"
          exit 1
        fi

        echo "## Cross-Platform Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Successfully compiled workflow on ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Platform:** ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
        echo "**Binary:** $BINARY" >> $GITHUB_STEP_SUMMARY
        echo "**Go version:** $(go version)" >> $GITHUB_STEP_SUMMARY

    - name: Clean up test files
      if: always()
      shell: bash
      run: |
        rm -f .github/workflows/test-cross-platform.md
        rm -f .github/workflows/test-cross-platform.lock.yml

  alpine-container-test:
    name: Alpine Container Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    concurrency:
      group: ci-${{ github.ref }}-alpine-container
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c   # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Report Go cache status
      run: |
        if [ "${{ steps.setup-go.outputs.cache-hit }}" == "true" ]; then
          echo "✅ Go cache hit" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Go cache miss" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Download dependencies with retry
      if: steps.setup-go.outputs.cache-hit != 'true'
      run: |
        set -e
        MAX_RETRIES=3
        RETRY_DELAY=5

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES: Downloading Go modules..."
          if go mod download; then
            echo "✅ Successfully downloaded Go modules"
            break
          else
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ Failed to download Go modules after $MAX_RETRIES attempts"
              echo "This may indicate that proxy.golang.org is unreachable"
              echo "Please check network connectivity or consider vendoring dependencies"
              exit 1
            fi
            echo "⚠️ Download failed, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          fi
        done

    - name: Verify dependencies
      run: go mod verify

    - name: Build Linux binary for Alpine
      run: make build-linux

    - name: Build Alpine Docker image
      run: |
        echo "Building Alpine Docker image..."
        docker build -t gh-aw-alpine:test \
          --build-arg BINARY=gh-aw-linux-amd64 \
          -f Dockerfile .
        echo "✅ Alpine Docker image built successfully"

    - name: Test Docker image basic commands
      run: |
        echo "Testing Docker image basic commands..."
        docker run --rm gh-aw-alpine:test --version
        docker run --rm gh-aw-alpine:test --help
        echo "✅ Basic commands work"

    - name: Create test workflow in container
      run: |
        echo "Creating test workflow file..."
        mkdir -p test-workspace/.github/workflows
        cat > test-workspace/.github/workflows/test-alpine.md << 'EOF'
        ---
        on: push
        engine: copilot
        ---
        # Test Workflow for Alpine Container

        This is a simple test workflow to verify the compile command works correctly in Alpine container.

        ## Task
        Echo hello from Alpine container.
        EOF
        echo "✅ Test workflow created"

    - name: Run compile through Alpine container
      run: |
        echo "Running compile command through Alpine container..."
        docker run --rm \
          -v "$(pwd)/test-workspace:/workspace" \
          -w /workspace \
          gh-aw-alpine:test compile test-alpine --verbose

        echo "✅ Compile command executed"

    - name: Verify lock file generation
      run: |
        echo "Verifying lock file was generated..."
        if [ -f "test-workspace/.github/workflows/test-alpine.lock.yml" ]; then
          echo "✅ Lock file generated successfully"
          echo ""
          echo "Lock file contents:"
          head -20 test-workspace/.github/workflows/test-alpine.lock.yml
        else
          echo "❌ Lock file not found"
          ls -la test-workspace/.github/workflows/
          exit 1
        fi

    - name: Generate test summary
      if: always()
      run: |
        echo "## Alpine Container Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "This test verifies that:" >> $GITHUB_STEP_SUMMARY
        echo "1. The Alpine Docker image can be built successfully" >> $GITHUB_STEP_SUMMARY
        echo "2. The gh-aw binary works correctly in Alpine Linux" >> $GITHUB_STEP_SUMMARY
        echo "3. The compile command can process workflows in the container" >> $GITHUB_STEP_SUMMARY
        echo "4. Lock files are generated correctly" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "test-workspace/.github/workflows/test-alpine.lock.yml" ]; then
          echo "✅ All tests passed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Lock file generation failed" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Clean up test files
      if: always()
      run: |
        rm -rf test-workspace

  safe-outputs-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2

    - name: Run Safe Outputs Conformance Checker
      id: conformance
      continue-on-error: true
      run: |
        echo "## Safe Outputs Conformance Check" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Run the conformance checker and capture output
        if ./scripts/check-safe-outputs-conformance.sh > conformance-output.txt 2>&1; then
          echo "✅ All conformance checks passed" >> $GITHUB_STEP_SUMMARY
          EXIT_CODE=0
        else
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "⚠️ Critical conformance issues found (treated as warning)" >> $GITHUB_STEP_SUMMARY
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "⚠️ High priority conformance issues found (treated as warning)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Conformance check completed with warnings" >> $GITHUB_STEP_SUMMARY
          fi
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Conformance Check Output" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat conformance-output.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        # Also output to console for visibility
        echo "=== Conformance Check Results ==="
        cat conformance-output.txt

        # Always succeed (treat as warning only)
        exit 0

    - name: Upload conformance report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02   # v4
      with:
        name: safe-outputs-conformance-report
        path: conformance-output.txt
        retention-days: 7

  notify-failure:
    name: Notify on CGO Failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && github.ref == 'refs/heads/main'
    needs:
    - test
    - canary-go
    - build
    - build-wasm
    - validate-yaml
    - bench
    - check-validator-sizes
    - lint-go
    - actions-build
    - fuzz
    - security
    - security-scan
    - mcp-server-compile-test
    - cross-platform-build
    - alpine-container-test
    - safe-outputs-conformance
    permissions:
      issues: write
    steps:
    - name: Check for job failures and create issue
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3   # v9
      with:
        script: |
          const needs = ${{ toJSON(needs) }};
          const failedJobs = Object.entries(needs)
            .filter(([, job]) => job.result === 'failure')
            .map(([name]) => name);
          const hasFuzzFailure = failedJobs.some(name => name === 'fuzz' || name.startsWith('fuzz-'));

          if (failedJobs.length === 0) {
            core.info('No jobs failed. Nothing to do.');
            return;
          }

          core.info(`Failed jobs: ${failedJobs.join(', ')}`);

          // Check for an existing open CGO failure issue to avoid duplicates
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: 'cgo-failure',
            state: 'open',
          });

          if (existingIssues.data.length > 0 && !hasFuzzFailure) {
            core.info(`Existing CGO failure issue #${existingIssues.data[0].number} is still open. Skipping.`);
            return;
          }

          if (hasFuzzFailure) {
            const existingFuzzIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cgo-fuzz-failure',
              state: 'open',
            });

            const existingFuzzIssueForRun = existingFuzzIssues.data.find(issue =>
              issue.title.includes(`Run #${context.runNumber}`),
            );
            if (existingFuzzIssueForRun) {
              core.info(`Fuzz failure issue #${existingFuzzIssueForRun.number} already exists for run #${context.runNumber}. Skipping.`);
              return;
            }
          }

          // Ensure required labels exist, creating them if missing
          const requiredLabels = [['cookie', 'e4e669'], ['cgo-failure', 'b60205']];
          if (hasFuzzFailure) {
            requiredLabels.push(['cgo-fuzz-failure', 'd93f0b']);
          }

          for (const [label, color] of requiredLabels) {
            try {
              await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color });
              }
            }
          }

          // Fetch all jobs for this run to get direct job links
          const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
            per_page: 100,
          });

          // Build a map from job name to job URL for failed jobs
          const jobUrlMap = {};
          for (const job of jobsResponse.data.jobs) {
            if (failedJobs.includes(job.name)) {
              jobUrlMap[job.name] = job.html_url;
            }
          }

          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const expiresAt = new Date(Date.now() + 4 * 60 * 60 * 1000).toISOString();

          const parseUTCOffsetMinutes = (rawOffset) => {
            const offset = typeof rawOffset === 'string' ? rawOffset.trim() : '';
            const match = offset.match(/^([+-])(\d{2}):(\d{2})$/);
            if (!match) return Number.NaN;
            const [, sign, hoursText, minutesText] = match;
            const hours = Number.parseInt(hoursText, 10);
            const minutes = Number.parseInt(minutesText, 10);
            if (hours > 14 || minutes > 59 || (hours === 14 && minutes !== 0)) {
              return Number.NaN;
            }
            const direction = sign === '-' ? -1 : 1;
            return direction * (hours * 60 + minutes);
          };

          let repoUTCOffset = '';
          try {
            const awConfigFile = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows/aw.json',
              ref: context.sha,
            });
            if (!Array.isArray(awConfigFile.data) && awConfigFile.data.type === 'file' && awConfigFile.data.content) {
              const awConfigRaw = Buffer.from(awConfigFile.data.content, 'base64').toString('utf8');
              const awConfig = JSON.parse(awConfigRaw);
              const rawUTC = typeof awConfig?.utc === 'string' ? awConfig.utc.trim() : '';
              if (!Number.isNaN(parseUTCOffsetMinutes(rawUTC))) {
                repoUTCOffset = rawUTC;
              } else if (rawUTC) {
                core.warning(`Ignoring invalid utc offset in .github/workflows/aw.json: ${rawUTC}`);
              }
            }
          } catch (error) {
            core.warning(`Unable to read .github/workflows/aw.json UTC offset: ${error?.message || String(error)}`);
          }

          // Format expiration line using the gh-aw-expires XML comment format
          const expiresDate = new Date(expiresAt);
          const repoOffsetMinutes = parseUTCOffsetMinutes(repoUTCOffset);
          const hasRepoUTCOffset = !Number.isNaN(repoOffsetMinutes);
          const displayDate = hasRepoUTCOffset
            ? new Date(expiresDate.getTime() + repoOffsetMinutes * 60 * 1000)
            : expiresDate;
          const humanReadableDate = displayDate.toLocaleString('en-US', {
            dateStyle: 'medium',
            timeStyle: 'short',
            timeZone: 'UTC',
          });
          const humanReadableSuffix = hasRepoUTCOffset ? `UTC${repoUTCOffset}` : 'UTC';
          const expirationLine = `- [x] expires <!-- gh-aw-expires: ${expiresAt} --> on ${humanReadableDate} ${humanReadableSuffix}`;

          const body = [
            `## CGO Workflow Failure`,
            ``,
            `Workflow run [#${context.runNumber}](${runUrl}) on the \`main\` branch completed with failed jobs.`,
            ``,
            `| Field | Value |`,
            `| --- | --- |`,
            `| Run ID | ${context.runId} |`,
            `| Commit | ${context.sha} |`,
            `| Expires | ${expiresAt} |`,
            ``,
            `## Failed Jobs`,
            ``,
            // Map job names to direct links; fall back to plain text if a job ID wasn't found
            ...failedJobs.map(name => jobUrlMap[name]
              ? `- [\`${name}\`](${jobUrlMap[name]})`
              : `- \`${name}\``),
            ``,
            `> This issue expires at ${expiresAt}. Please investigate the failed jobs above and close once resolved.`,
            `> ${expirationLine}`,
          ];

          if (hasFuzzFailure) {
            body.splice(
              4,
              0,
              `Detected failure in the \`fuzz\` job matrix. A dedicated fuzz failure label was applied so this run is tracked.`,
              ``,
            );
          }

          const issueBody = body.join('\n');

          const issueLabels = ['cookie', 'cgo-failure'];
          if (hasFuzzFailure) {
            issueLabels.push('cgo-fuzz-failure');
          }

          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: hasFuzzFailure
              ? `[CGO][FUZZ] Workflow failure on main - Run #${context.runNumber}`
              : `[CGO] Workflow failure on main - Run #${context.runNumber}`,
            body: issueBody,
            labels: issueLabels,
          });

          core.info(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
